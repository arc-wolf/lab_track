{% extends "base.html" %}
{% block content %}
<section class="glass-panel p-4 mb-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
        <div>
            <div class="hero-eyebrow mb-1">Admin Profile Console</div>
            <h3 class="mb-1 fw-bold">Lab Admin Account Settings</h3>
            <p class="text-muted mb-0">Update your personal details and login credentials.</p>
        </div>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>
</section>

<div class="glass-panel p-4">
    <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
            <label class="form-label">Username</label>
            <input class="form-control" value="{{ request.user.username }}" disabled>
        </div>
        <div class="col-md-6">
            <label class="form-label">Role</label>
            <input class="form-control" value="Lab Admin" disabled>
        </div>
        <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="full_name" value="{{ admin_profile.full_name|default:'' }}" placeholder="Your full name">
        </div>
        <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" value="{{ admin_profile.phone|default:'' }}" placeholder="+919876543210" inputmode="tel" pattern="^\+?[0-9]{10,15}$" title="Use 10-15 digits, optional leading +">
        </div>
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" value="{{ request.user.email|default:'' }}" placeholder="Email address">
        </div>
        <div class="col-md-6">
            <label class="form-label">New Password</label>
            <input class="form-control" name="password" type="password" placeholder="Leave blank to keep current">
        </div>
        <div class="col-12">
            <button class="btn btn-primary">Save Profile</button>
        </div>
    </form>
</div>
{% endblock %}
