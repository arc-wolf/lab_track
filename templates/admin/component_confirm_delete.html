{% extends "base.html" %}
{% block content %}
<div class="glass-panel p-4">
    <h3 class="mb-3">Delete Component</h3>
    <p>Are you sure you want to remove <strong>{{ component.name }}</strong>?</p>
    <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, delete</button>
        <a href="{% url 'admin_components' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
