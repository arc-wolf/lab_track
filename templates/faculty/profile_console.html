{% extends "base.html" %}
{% block content %}
<section class="glass-panel p-4 mb-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
        <div>
            <div class="hero-eyebrow mb-1">Faculty Profile</div>
            <h3 class="mb-1 fw-bold">My Profile Settings</h3>
            <p class="text-muted mb-0">Update your details used across approvals and group oversight.</p>
        </div>
        <a href="{% url 'faculty_dashboard' %}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>
</section>

<div class="glass-panel p-4">
    <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" value="{{ request.user.username }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Role</label>
            <input class="form-control" value="Faculty" disabled>
        </div>
        <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="full_name" value="{{ faculty_profile.full_name|default:'' }}" maxlength="150" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" value="{{ faculty_profile.phone|default:'' }}" inputmode="tel" pattern="^\d{10}$" title="Use exactly 10 digits" placeholder="9876543210" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ request.user.email|default:'' }}" readonly>
            <small class="text-muted">Email is verified and locked for faculty accounts.</small>
        </div>
        <div class="col-md-6">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current">
        </div>
        <div class="col-12">
            <button class="btn btn-primary">Save Profile</button>
        </div>
    </form>
</div>
{% endblock %}
