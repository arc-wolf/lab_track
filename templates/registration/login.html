{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-4 col-md-6 col-sm-10">
        <div class="glass-panel p-4">
            <h3 class="mb-2 text-center">Welcome back to LabTrack</h3>
            <p class="text-center text-muted small mb-4">Use your campus credentials to continue.</p>
            <form method="post" class="mb-3">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text"
                           name="{{ form.username.html_name }}"
                           value="{{ form.username.value|default_if_none:'' }}"
                           autofocus
                           autocomplete="username"
                           class="form-control"
                           placeholder="yourid" />
                    {{ form.username.errors }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password"
                           name="{{ form.password.html_name }}"
                           autocomplete="current-password"
                           class="form-control"
                           placeholder="••••••••" />
                    {{ form.password.errors }}
                </div>
                <button class="btn btn-primary w-100">Login</button>
            </form>
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <a href="{% url 'password_reset' %}" class="small text-decoration-none text-muted">Forgot password?</a>
                <a href="{% url 'signup' %}" class="text-decoration-none fw-semibold" style="color: var(--amrita-gold);">
                    Need an Amrita account? Register here
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
